version: '3'
services:
    postgres:
        image: bgpdata/postgres:latest
        restart: unless-stopped
        deploy:
            restart_policy:
                condition: any
            placement:
                constraints:
                    - node.role == worker
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U bgpdata"]
            interval: 30s
            timeout: 10s
            retries: 5
        privileged: true
        shm_size: 1536m
        sysctls:
            - net.ipv4.tcp_keepalive_intvl=30
            - net.ipv4.tcp_keepalive_probes=5
            - net.ipv4.tcp_keepalive_time=180
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - timescale_data:/var/lib/postgresql/ts
        command: >
            -c max_wal_size=10GB
        environment:
            POSTGRES_PASSWORD: bgpdata
            POSTGRES_USER: bgpdata
            POSTGRES_DB: bgpdata
        
    web:
        image: bgpdata/web:latest
        restart: unless-stopped
        deploy:
            restart_policy:
                condition: any
            placement:
                constraints:
                    - node.role == manager
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        environment:
            SECRET_KEY: ${SECRET_KEY}
            KAFKA_FQDN: kafka:29092
            KAFKA_JMX_FQDN: kafka:9999
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
            POSTGRES_DB: bgpdata
            POSTGRES_USER: bgpdata
            POSTGRES_PASSWORD: bgpdata
            POSTMARK_API_KEY: ${POSTMARK_API_KEY}
            FLASK_HOST: https://bgp-data.net
            ENVIRONMENT: production
        depends_on:
            - postgres
        volumes:
        entrypoint: >
            /bin/sh -c "python manage.py run --host 0.0.0.0"
    relay-rrc00:
        image: bgpdata/relay:latest
        restart: "no"
        stop_signal: SIGTERM                    # Wind down relay safely before stopping
        stop_grace_period: 20s                  # Wait for 20 seconds before forcefully stopping
        deploy:
            restart_policy:
                condition: none
            placement:
                constraints:
                    - node.role == worker
        environment:
            HOST: rrc00
            COLLECTOR_CONNECT: collector-rrc00:5000
        depends_on:
            - collector-rrc00
        volumes:
            - relay_rrc00_data:/var/lib/rocksdb
        entrypoint: >
            bash -c "sleep $$((1 * 120)) && python main.py"
    
    relay-rrc01:
        image: bgpdata/relay:latest
